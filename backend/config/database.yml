default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV.fetch("DATABASE_URL") { "postgres://postgres:postgres@localhost:5432/petpocketbook" } %>

development:
  <<: *default

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_TEST_URL") { "postgres://postgres:postgres@localhost:5432/petpocketbook_test" } %>

production:
  <<: *default
